<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Ming Toronto | Personal Trainer</title>
    <style>
        :root {
            --apple-black: #1d1d1f;
            --apple-grey: #86868b;
            --apple-light: #f5f5f7;
            --accent-blue: #0071e3;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; color: var(--apple-black); line-height: 1.5; background: #fff; scroll-behavior: smooth; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        section { padding: 80px 0; }
        .section-title { font-size: 40px; font-weight: 700; text-align: center; margin-bottom: 40px; letter-spacing: -0.5px; }
        
        /* Navigation */
        nav { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); z-index: 1000; padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        nav .container { display: flex; justify-content: center; gap: 25px; }
        nav a { text-decoration: none; color: var(--apple-black); font-size: 14px; font-weight: 500; opacity: 0.7; transition: 0.3s; }
        nav a:hover { opacity: 1; color: var(--accent-blue); }

        /* Photo Grids */
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .photo-card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; }
        .photo-card img { width: 100%; height: auto; display: block; }
        .photo-card:hover { transform: translateY(-5px); }

        /* FAQ */
        .faq-item { border-bottom: 1px solid #eee; padding: 20px 0; cursor: pointer; }
        .faq-q { font-size: 18px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .faq-a { display: none; padding-top: 15px; color: var(--apple-grey); line-height: 1.6; }
        .faq-item.active .faq-a { display: block; }

        /* WhatsApp Button */
        .whatsapp-btn { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 2000; text-decoration: none; }
        
        @media (max-width: 600px) {
            .section-title { font-size: 32px; }
        }
    </style>
</head>

        </div>
    </nav>
