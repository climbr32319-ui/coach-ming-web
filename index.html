<!DOCTYPE html>
<html lang="zh-HK">
<head>

    <style>
        :root {
            --apple-black: #1d1d1f;
            --apple-grey: #86868b;
            --apple-light: #f5f5f7;
            --accent-blue: #0071e3;
            --success-green: #25d366;
        }
        /* 基礎設置 */
        html, body { overflow-x: hidden; width: 100%; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; color: var(--apple-black); line-height: 1.6; background: #fff; -webkit-font-smoothing: antialiased; }
        .container { max-width: 1060px; margin: 0 auto; padding: 0 20px; box-sizing: border-box; }
        section { padding: 80px 0; width: 100%; box-sizing: border-box; }
        
        /* 導航欄 */
        nav { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 1000; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        nav .container { display: flex; justify-content: center; gap: clamp(10px, 4vw, 30px); }
        nav a { text-decoration: none; color: var(--apple-black); font-size: 13px; font-weight: 500; opacity: 0.8; }

        /* Hero 主視覺 */
        .hero { padding: clamp(120px, 20vh, 180px) 0 80px; text-align: center; }
        .hero h1 { font-size: clamp(32px, 8vw, 64px); font-weight: 700; margin: 0; letter-spacing: -1.5px; line-height: 1.1; }
        .hero .slogan-cn { font-size: clamp(20px, 5vw, 28px); font-weight: 600; margin: 20px 0 10px; }
        .hero .slogan-en { font-size: clamp(14px, 3vw, 18px); color: var(--apple-grey); margin-bottom: 40px; }
        .cta-btn { background-color: var(--accent-blue); color: white; padding: 14px 28px; border-radius: 980px; text-decoration: none; font-size: 17px; font-weight: 500; display: inline-block; transition: transform 0.2s; }

        /* 關於教練 */
        .about-box { background: var(--apple-light); padding: clamp(25px, 5vw, 50px); border-radius: 24px; margin-top: -20px; }
        .badge-list { list-style: none; padding: 0; margin-top: 30px; }
        .badge-item { display: flex; align-items: flex-start; margin-bottom: 20px; font-size: 15px; font-weight: 600; line-height: 1.4; }
        .badge-icon { background: #fff; min-width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* 訓練課程 */
        .service-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .service-card { background: #fff; padding: 40px 30px; border-radius: 24px; border: 1px solid rgba(0,0,0,0.08); transition: all 0.3s ease; }
        .service-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.05); border-color: transparent; }
        .service-card h3 { font-size: 24px; margin: 0 0 5px; }
        .service-card .en-title { font-size: 13px; color: var(--accent-blue); font-weight: 700; text-transform: uppercase; margin-bottom: 20px; display: block; }
        .service-card ul { padding: 0; list-style: none; font-size: 15px; color: #4b4b4d; }
        .service-card li { margin-bottom: 12px; padding-left: 20px; position: relative; }
        .service-card li::before { content: "✓"; position: absolute; left: 0; color: var(--accent-blue); font-weight: bold; }

        /* 直向圖片排版 (9:16) */
        .photo-grid-vertical { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .photo-card-v { border-radius: 12px; overflow: hidden; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .photo-card-v img { width: 100%; display: block; aspect-ratio: 9 / 16; object-fit: cover; }

        /* 訓練影片區塊 */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .video-card { background: #000; border-radius: 20px; overflow: hidden; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .iframe-container { position: relative; width: 100%; padding-bottom: 177.78%; height: 0; pointer-events: none; }
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scale(1.1); }
        .video-label { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: #fff; padding: 15px 10px; z-index: 10; font-size: 13px; font-weight: 500; text-align: center; }

        /* FAQ */
        .faq-item { border-bottom: 1px solid #eee; padding: 22px 0; cursor: pointer; }
        .faq-q { font-size: 16px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .faq-a { display: none; padding-top: 15px; color: var(--apple-grey); font-size: 14px; line-height: 1.6; }
        .faq-item.active .faq-a { display: block; }

        /* WhatsApp */
        .whatsapp-btn { position: fixed; bottom: 25px; right: 25px; background: var(--success-green); width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(37,211,102,0.3); z-index: 2000; }

        @media (max-width: 600px) {
            .video-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
    </style>
</head>
