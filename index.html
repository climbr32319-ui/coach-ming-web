            --accent-blue: #0071e3;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; color: var(--apple-black); line-height: 1.5; background: #fff; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        section { padding: 100px 0; border-bottom: 1px solid #eee; }
        .section-title { font-size: 48px; font-weight: 700; text-align: center; margin-bottom: 50px; letter-spacing: -0.5px; }
        img { max-width: 100%; height: auto; display: block; }
        
        /* 導航欄 */
        nav { position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); z-index: 1000; padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        nav .container { display: flex; justify-content: center; gap: 30px; }
        nav a { text-decoration: none; color: var(--apple-black); font-size: 14px; font-weight: 400; opacity: 0.8; }

        /* InBody 卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .stat-card { background: var(--apple-light); padding: 30px; border-radius: 20px; text-align: center; }
        .stat-value { font-size: 32px; font-weight: 700; color: var(--accent-blue); }
        
        /* FAQ Style */
        .faq-item { border-bottom: 1px solid #e5e5e5; padding: 25px 0; cursor: pointer; }
        .faq-q { font-size: 20px; font-weight: 600; display: flex; justify-content: space-between; }
        .faq-a { display: none; padding-top: 15px; color: var(--apple-grey); line-height: 1.8; }
        .faq-item.active .faq-a { display: block; }

        .whatsapp-float { position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 2000; text-decoration: none; }
    </style>
